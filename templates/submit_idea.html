{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card p-4 shadow-sm">
      <h3>Submit Startup Idea</h3>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Idea Title</label>
          <input class="form-control" type="text" name="title" placeholder="e.g., AI-based Student Career Coach" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="6" placeholder="Describe the problem, target audience, and your solution..." required></textarea>
        </div>
        <button class="btn btn-success" type="submit">Analyze Idea</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
